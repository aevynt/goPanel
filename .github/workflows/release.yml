name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Update version in code
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          perl -pi -e "s/const AppVersion = \".*\"/const AppVersion = \"$TAG\"/" internal/update/checker.go

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build goPanel
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o "goPanel-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goPanel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: goPanel-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          NOTES=$(cat <<'EOF'
          ## goPanel ${{ github.ref_name }}

          ### Changes
          $(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --oneline --no-decorate || echo "Initial release")

          ### Downloads
          - **Linux amd64**: `goPanel-linux-amd64`
          - **Linux arm64**: `goPanel-linux-arm64`
          - **Windows amd64**: `goPanel-windows-amd64.exe`
          - **macOS amd64**: `goPanel-darwin-amd64`
          - **macOS arm64**: `goPanel-darwin-arm64`
          EOF
          )
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            artifacts/**/*
          generate_release_notes: false
